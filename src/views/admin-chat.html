<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakeupOcean - Support Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .header { background: #661F1D; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; }
    .container { display: flex; height: calc(100vh - 56px); }
    .sidebar { width: 320px; background: white; border-right: 1px solid #e0e0e0; overflow-y: auto; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e0e0; font-weight: 600; color: #661F1D; }
    .chat-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
    .chat-item:hover { background: #FFF5F8; }
    .chat-item.active { background: #FFF0F5; border-left: 3px solid #661F1D; }
    .chat-item.pending { border-left: 3px solid #F59E0B; }
    .chat-item .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .chat-item .preview { font-size: 13px; color: #737373; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .chat-item .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge.pending { background: #FEF3C7; color: #92400E; }
    .badge.human { background: #D1FAE5; color: #065F46; }
    .badge.ai { background: #E0E7FF; color: #3730A3; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; background: white; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    .chat-header .user-info { font-weight: 600; font-size: 16px; }
    .chat-header .actions { display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #661F1D; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-warning { background: #F59E0B; color: white; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .message.user { align-self: flex-start; background: #f0f0f0; border-bottom-left-radius: 4px; }
    .message.assistant { align-self: flex-end; background: #661F1D; color: white; border-bottom-right-radius: 4px; }
    .message.assistant.ai-msg { background: #E0E7FF; color: #333; }
    .message .time { font-size: 11px; opacity: 0.6; margin-top: 4px; }
    .message .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin-bottom: 2px; }
    .input-area { padding: 16px 20px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; }
    .input-area input:focus { border-color: #661F1D; }
    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #a0a0a0; font-size: 16px; }
    .typing { font-size: 13px; color: #737373; padding: 4px 0; font-style: italic; }
    .notification { position: fixed; top: 16px; right: 16px; background: #661F1D; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>MakeupOcean Support Dashboard</h1>
    <div class="status">
      <div class="dot" id="connectionDot"></div>
      <span id="connectionStatus">Connecting...</span>
    </div>
  </div>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">Active Chats <span id="chatCount">(0)</span></div>
      <div id="chatList"></div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="empty-state">Select a chat to start supporting</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ auth: { apiKey: prompt('Enter API Key:') || '' } });
    let activeSessionId = null;
    const chatCache = {};

    // Connection handling
    socket.on('connect', () => {
      document.getElementById('connectionDot').style.background = '#4CAF50';
      document.getElementById('connectionStatus').textContent = 'Connected';
      const adminName = prompt('Enter your name:') || 'Support Agent';
      socket.emit('admin:join', { name: adminName });
    });

    socket.on('disconnect', () => {
      document.getElementById('connectionDot').style.background = '#EF4444';
      document.getElementById('connectionStatus').textContent = 'Disconnected';
    });

    // Receive list of chats
    socket.on('admin:chat_list', ({ chats }) => {
      chats.forEach(c => { chatCache[c.sessionId] = c; });
      renderChatList();
    });

    // New chat needing support
    socket.on('admin:new_chat', (data) => {
      chatCache[data.sessionId] = data;
      renderChatList();
      showNotification(`New chat from ${data.userName}: ${data.reason}`);
    });

    // Chat accepted by another admin
    socket.on('admin:chat_accepted', ({ sessionId, adminName }) => {
      if (chatCache[sessionId]) chatCache[sessionId].mode = 'HUMAN';
      renderChatList();
    });

    // Receive chat history after accepting
    socket.on('admin:chat_history', ({ sessionId, userName, history }) => {
      activeSessionId = sessionId;
      renderChatArea(sessionId, userName, history);
    });

    // Live user messages
    socket.on('chat:user_message', ({ sessionId, message }) => {
      if (sessionId === activeSessionId) {
        appendMessage(message, 'user');
      }
      if (chatCache[sessionId]) {
        chatCache[sessionId].lastMessage = message.content;
      }
      renderChatList();
    });

    // User typing
    socket.on('chat:user_typing', ({ sessionId, userName }) => {
      if (sessionId === activeSessionId) {
        showTyping(userName);
      }
    });

    // User disconnected
    socket.on('chat:user_disconnected', ({ sessionId, userName }) => {
      showNotification(`${userName} disconnected from chat`);
    });

    // ─── Render Functions ──────────────────────

    function renderChatList() {
      const list = document.getElementById('chatList');
      const entries = Object.values(chatCache);
      document.getElementById('chatCount').textContent = `(${entries.length})`;

      list.innerHTML = entries.map(c => {
        const modeClass = c.mode === 'PENDING_HUMAN' ? 'pending' : c.mode === 'HUMAN' ? 'active' : '';
        const badgeClass = c.mode === 'PENDING_HUMAN' ? 'pending' : c.mode === 'HUMAN' ? 'human' : 'ai';
        const badgeLabel = c.mode === 'PENDING_HUMAN' ? 'Waiting' : c.mode === 'HUMAN' ? 'Active' : 'AI';
        return `
          <div class="chat-item ${modeClass}" onclick="acceptChat('${c.sessionId}')">
            <div class="name">${esc(c.userName)}</div>
            <div class="preview">${esc(c.lastMessage || 'No messages yet')}</div>
            <div class="meta">
              <span class="badge ${badgeClass}">${badgeLabel}</span>
              <span style="font-size:11px;color:#a0a0a0">${timeAgo(c.createdAt)}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderChatArea(sessionId, userName, history) {
      const area = document.getElementById('chatArea');
      area.innerHTML = `
        <div class="chat-header">
          <div class="user-info">${esc(userName)}</div>
          <div class="actions">
            <button class="btn btn-warning" onclick="transferToAI('${sessionId}')">Transfer to AI</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div id="typingIndicator" class="typing" style="padding:0 20px;display:none"></div>
        <div class="input-area">
          <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="btn btn-primary" onclick="sendMsg()">Send</button>
        </div>
      `;
      const msgContainer = document.getElementById('messages');
      history.forEach(m => appendMessage(m, m.role));
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function appendMessage(msg, role) {
      const msgContainer = document.getElementById('messages');
      if (!msgContainer) return;
      const isAI = role === 'assistant' && !msg.isHuman;
      const div = document.createElement('div');
      div.className = `message ${role}${isAI ? ' ai-msg' : ''}`;
      div.innerHTML = `
        <div class="label">${role === 'user' ? 'Customer' : (isAI ? 'AI (Mia)' : 'You')}</div>
        <div>${esc(msg.content)}</div>
        <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
      `;
      msgContainer.appendChild(div);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function showTyping(name) {
      const el = document.getElementById('typingIndicator');
      if (el) {
        el.textContent = `${name} is typing...`;
        el.style.display = 'block';
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
      }
    }

    // ─── Actions ───────────────────────────────

    function acceptChat(sessionId) {
      socket.emit('admin:accept_chat', { sessionId });
    }

    function sendMsg() {
      const input = document.getElementById('msgInput');
      if (!input || !input.value.trim() || !activeSessionId) return;
      const text = input.value.trim();
      socket.emit('admin:message', { sessionId: activeSessionId, message: text });
      appendMessage({ content: text, timestamp: Date.now(), isHuman: true }, 'assistant');
      input.value = '';
      socket.emit('admin:typing', { sessionId: activeSessionId });
    }

    function transferToAI(sessionId) {
      if (confirm('Transfer this chat back to AI?')) {
        socket.emit('admin:transfer_to_ai', { sessionId });
        delete chatCache[sessionId];
        activeSessionId = null;
        document.getElementById('chatArea').innerHTML = '<div class="empty-state">Select a chat to start supporting</div>';
        renderChatList();
      }
    }

    // ─── Helpers ───────────────────────────────

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function timeAgo(ts) {
      const mins = Math.floor((Date.now() - ts) / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      return `${Math.floor(mins / 60)}h ago`;
    }

    function showNotification(text) {
      const n = document.createElement('div');
      n.className = 'notification';
      n.textContent = text;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }
  </script>
</body>
</html>
